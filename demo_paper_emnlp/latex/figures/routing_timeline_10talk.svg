    <rect x="1034" y="190" width="136" height="58" fill="#d9822b"/>
    <rect x="1172" y="190" width="4" height="58" fill="#d9822b"/>
    <rect x="1176" y="190" width="134" height="58" fill="#4f7cac"/>
    <rect x="1312" y="190" width="106" height="58" fill="#d9822b"/>
    <rect x="1418" y="190" width="14" height="58" fill="#4f7cac"/>
    <rect x="1432" y="190" width="16" height="58" fill="#d9822b"/>
    <rect x="1448" y="190" width="2" height="58" fill="#94a3b8"/>
    <rect x="1452" y="190" width="10" height="58" fill="#94a3b8"/>
    <rect x="1462" y="190" width="48" height="58" fill="#4f7cac"/>
    <rect x="1510" y="190" width="51" height="58" fill="#94a3b8"/>
    <rect x="1561" y="190" width="29" height="58" fill="#4f7cac"/>
    <rect x="1592" y="190" width="3" height="58" fill="#4f7cac"/>
