<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760" role="img" aria-labelledby="title desc">
  <title id="title">AutoTerm-SST architecture illustrated with an NLP-to-medicine stream</title>
  <desc id="desc">A RASST-style example-driven architecture. Earlier speech about SRL retrieves an NLP term, while a later medical segment retrieves rectal cancer after AutoTerm switches the active glossary from NLP to medicine using sliding-window context similarity.</desc>
  <defs>
    <marker id="arrow-ink" markerWidth="4.5" markerHeight="3.5" refX="4.2" refY="1.75" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L4.5,1.75 L0,3.5 Z" fill="#222222"/>
    </marker>
    <marker id="arrow-blue" markerWidth="4.5" markerHeight="3.5" refX="4.2" refY="1.75" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L4.5,1.75 L0,3.5 Z" fill="#1682AD"/>
    </marker>
    <marker id="arrow-purple" markerWidth="4.5" markerHeight="3.5" refX="4.2" refY="1.75" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L4.5,1.75 L0,3.5 Z" fill="#84257F"/>
    </marker>
    <marker id="arrow-orange" markerWidth="4.5" markerHeight="3.5" refX="4.2" refY="1.75" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L4.5,1.75 L0,3.5 Z" fill="#C86A32"/>
    </marker>
    <style>
      text { font-family: Arial, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #222222; }
      .model-title { font-size: 34px; font-weight: 700; }
      .component-title { font-size: 29px; font-weight: 700; }
      .label { font-size: 25px; }
      .small { font-size: 23px; fill: #5F6670; }
      .example { font-size: 31px; }
      .translation { font-size: 34px; }
      .domain { font-size: 25px; font-weight: 700; }
      .term { font-size: 24px; font-weight: 600; }
      .box { fill: #FFFFFF; stroke: #222222; stroke-width: 2.6; }
      .feature-box { fill: #FFFFFF; stroke: #1682AD; stroke-width: 2.5; }
      .term-box { fill: #FFFFFF; stroke: #84257F; stroke-width: 2.5; }
      .autoterm-box { fill: #FFFBF7; stroke: #C86A32; stroke-width: 2.8; }
      .nlp-box { fill: #F1F8FC; stroke: #1682AD; stroke-width: 2.4; }
      .medicine-box { fill: #FFF6EF; stroke: #C86A32; stroke-width: 2.4; }
      .forward { fill: none; stroke: #222222; stroke-width: 3; marker-end: url(#arrow-ink); }
      .feature-line { fill: none; stroke: #1682AD; stroke-width: 3; marker-end: url(#arrow-blue); }
      .term-line { fill: none; stroke: #84257F; stroke-width: 3; marker-end: url(#arrow-purple); }
      .control-line { fill: none; stroke: #C86A32; stroke-width: 3; marker-end: url(#arrow-orange); }
      .output-line { fill: none; stroke: #C86A32; stroke-width: 2.5; marker-end: url(#arrow-orange); }
      .feedback-line { fill: none; stroke: #C86A32; stroke-width: 2.7; stroke-dasharray: 9 7; marker-end: url(#arrow-orange); }
      .thin { fill: none; stroke: #667085; stroke-width: 2.2; }
    </style>
  </defs>

  <rect width="1800" height="760" fill="#FFFFFF"/>

  <!-- Example translations are aligned with the two speech snapshots below. -->
  <text x="365" y="32" class="translation" text-anchor="middle" dominant-baseline="central">
    <tspan>……我们改进</tspan><tspan fill="#3B7F2B" font-weight="700">语义角色标注</tspan><tspan>……</tspan>
  </text>
  <rect x="230" y="56" width="270" height="34" fill="#FFFFFF" stroke="#C86A32" stroke-width="2"/>
  <text x="365" y="80" class="small" text-anchor="middle" fill="#B85120"><tspan>Translation at Chunk</tspan><tspan baseline-shift="sub" font-size="16">t</tspan></text>

  <text x="1080" y="27" class="translation" text-anchor="middle" dominant-baseline="central">
    <tspan>……患者患有</tspan><tspan fill="#3B7F2B" font-weight="700">直肠癌</tspan><tspan>。</tspan>
  </text>
  <rect x="930" y="56" width="300" height="34" fill="#FFFFFF" stroke="#C86A32" stroke-width="2"/>
  <text x="1080" y="80" class="small" text-anchor="middle" fill="#B85120"><tspan>Translation at Chunk</tspan><tspan baseline-shift="sub" font-size="16">t+k</tspan></text>

  <!-- Shared speech-language model. -->
  <rect x="100" y="108" width="1600" height="105" class="box"/>
  <text x="900" y="170" class="model-title" text-anchor="middle">Large Language Model</text>
  <path d="M365 108 V90" class="output-line"/>
  <path d="M1080 108 V90" class="output-line"/>

  <!-- Time-aligned model inputs, following the visual grammar of RASST Figure 1. -->
  <rect x="125" y="238" width="220" height="43" class="feature-box"/>
  <text x="235" y="268" class="label" text-anchor="middle" fill="#116E93">Speech feature h<tspan baseline-shift="sub" font-size="18">t</tspan></text>
  <rect x="380" y="238" width="270" height="43" class="term-box"/>
  <text x="515" y="268" class="label" text-anchor="middle" fill="#84257F">Term map G<tspan baseline-shift="sub" font-size="18">t</tspan></text>

  <rect x="720" y="238" width="250" height="43" class="feature-box"/>
  <text x="845" y="268" class="label" text-anchor="middle" fill="#116E93">Speech feature h<tspan baseline-shift="sub" font-size="18">t+k</tspan></text>
  <rect x="1000" y="238" width="300" height="43" class="term-box"/>
  <text x="1150" y="268" class="label" text-anchor="middle" fill="#84257F">Term map G<tspan baseline-shift="sub" font-size="18">t+k</tspan></text>

  <path d="M235 238 V216" class="feature-line"/>
  <path d="M515 238 V216" class="term-line"/>
  <path d="M845 238 V216" class="feature-line"/>
  <path d="M1150 238 V216" class="term-line"/>

  <!-- RASST speech and retrieval backbone. -->
  <rect x="105" y="350" width="510" height="78" class="box"/>
  <text x="360" y="399" class="component-title" text-anchor="middle">Causal Speech Encoder</text>

  <rect x="660" y="350" width="455" height="78" class="box"/>
  <text x="888" y="399" class="component-title" text-anchor="middle">Cross-Modal MaxSim Retriever</text>

  <path d="M235 350 V284" class="feature-line"/>
  <path d="M520 350 V304 H845 V284" class="feature-line"/>
  <path d="M770 350 V322 H515 V284" class="term-line"/>
  <path d="M1010 350 V338 H1150 V284" class="term-line"/>

  <!-- Earlier and later chunks are separated by an omitted interval; no immediate t-to-t+1 switch is implied. -->
  <rect x="105" y="520" width="380" height="43" class="feature-box"/>
  <text x="295" y="550" class="domain" text-anchor="middle" fill="#116E93"><tspan>Chunk</tspan><tspan baseline-shift="sub" font-size="18">t</tspan><tspan> · NLP active</tspan></text>
  <rect x="595" y="520" width="500" height="43" class="medicine-box"/>
  <text x="845" y="550" class="domain" text-anchor="middle" fill="#B85120"><tspan>Chunk</tspan><tspan baseline-shift="sub" font-size="18">t+k</tspan><tspan> · Medicine active</tspan></text>

  <path d="M250 520 V431" class="forward"/>
  <path d="M770 520 V497 H500 V431" class="forward"/>
  <path d="M340 520 V470 H760 V431" class="forward"/>
  <path d="M900 520 V431" class="forward"/>

  <g stroke="#1682AD" stroke-width="4">
    <line x1="125" y1="598" x2="125" y2="624"/><line x1="138" y1="582" x2="138" y2="640"/>
    <line x1="151" y1="590" x2="151" y2="632"/><line x1="164" y1="574" x2="164" y2="648"/>
    <line x1="177" y1="596" x2="177" y2="626"/><line x1="190" y1="585" x2="190" y2="637"/>
    <line x1="203" y1="599" x2="203" y2="623"/><line x1="216" y1="580" x2="216" y2="642"/>
    <line x1="229" y1="592" x2="229" y2="630"/><line x1="242" y1="576" x2="242" y2="646"/>
    <line x1="255" y1="594" x2="255" y2="628"/><line x1="268" y1="584" x2="268" y2="638"/>
    <line x1="281" y1="600" x2="281" y2="622"/><line x1="294" y1="578" x2="294" y2="644"/>
    <line x1="307" y1="589" x2="307" y2="633"/><line x1="320" y1="572" x2="320" y2="650"/>
    <line x1="333" y1="595" x2="333" y2="627"/><line x1="346" y1="581" x2="346" y2="641"/>
    <line x1="359" y1="599" x2="359" y2="623"/><line x1="372" y1="586" x2="372" y2="636"/>
    <line x1="385" y1="593" x2="385" y2="629"/><line x1="398" y1="579" x2="398" y2="643"/>
    <line x1="411" y1="598" x2="411" y2="624"/><line x1="424" y1="588" x2="424" y2="634"/>
    <line x1="437" y1="596" x2="437" y2="626"/><line x1="450" y1="583" x2="450" y2="639"/>
  </g>

  <g stroke="#1682AD" stroke-width="4">
    <line x1="620" y1="598" x2="620" y2="624"/><line x1="635" y1="580" x2="635" y2="642"/>
    <line x1="650" y1="591" x2="650" y2="631"/><line x1="665" y1="572" x2="665" y2="650"/>
    <line x1="680" y1="596" x2="680" y2="626"/><line x1="695" y1="584" x2="695" y2="638"/>
    <line x1="710" y1="599" x2="710" y2="623"/><line x1="725" y1="577" x2="725" y2="645"/>
    <line x1="740" y1="590" x2="740" y2="632"/><line x1="755" y1="574" x2="755" y2="648"/>
    <line x1="770" y1="595" x2="770" y2="627"/><line x1="785" y1="582" x2="785" y2="640"/>
    <line x1="800" y1="600" x2="800" y2="622"/><line x1="815" y1="579" x2="815" y2="643"/>
    <line x1="830" y1="592" x2="830" y2="630"/><line x1="845" y1="570" x2="845" y2="652"/>
    <line x1="860" y1="595" x2="860" y2="627"/><line x1="875" y1="583" x2="875" y2="639"/>
    <line x1="890" y1="598" x2="890" y2="624"/><line x1="905" y1="576" x2="905" y2="646"/>
    <line x1="920" y1="590" x2="920" y2="632"/><line x1="935" y1="581" x2="935" y2="641"/>
    <line x1="950" y1="599" x2="950" y2="623"/><line x1="965" y1="585" x2="965" y2="637"/>
    <line x1="980" y1="596" x2="980" y2="626"/><line x1="995" y1="579" x2="995" y2="643"/>
    <line x1="1010" y1="592" x2="1010" y2="630"/><line x1="1025" y1="586" x2="1025" y2="636"/>
    <line x1="1040" y1="598" x2="1040" y2="624"/><line x1="1055" y1="582" x2="1055" y2="640"/>
  </g>

  <text x="295" y="688" class="example" text-anchor="middle">
    <tspan>“…we improve</tspan><tspan dx="8" fill="#3B7F2B" font-weight="700">SRL</tspan><tspan>…”</tspan>
  </text>
  <text x="845" y="688" class="example" text-anchor="middle">
    <tspan>“…the patient has</tspan><tspan dx="8" fill="#3B7F2B" font-weight="700">rectal cancer</tspan><tspan>.”</tspan>
  </text>

  <path d="M495 612 H565" class="thin"/>
  <text x="530" y="603" class="example" text-anchor="middle" fill="#667085">…</text>
  <text x="530" y="637" class="small" text-anchor="middle">domain shift</text>

  <!-- AutoTerm selects the active glossary from sliding-window context similarity. -->
  <rect x="1160" y="320" width="530" height="365" class="autoterm-box"/>
  <text x="1190" y="365" class="component-title" fill="#B85120">AutoTerm</text>

  <rect x="1190" y="390" width="470" height="94" fill="#FFFFFF" stroke="#C86A32" stroke-width="2.2"/>
  <text x="1425" y="447" class="domain" text-anchor="middle">Sliding-window context similarity</text>

  <rect x="1190" y="510" width="215" height="143" class="nlp-box"/>
  <text x="1298" y="543" class="domain" text-anchor="middle" fill="#116E93">NLP Glossary</text>
  <line x1="1210" y1="556" x2="1385" y2="556" stroke="#AFCFDE" stroke-width="2"/>
  <text x="1298" y="587" class="term" text-anchor="middle">SRL</text>
  <text x="1298" y="621" class="term" text-anchor="middle" fill="#84257F">→ 语义角色标注</text>

  <rect x="1435" y="510" width="225" height="143" class="medicine-box"/>
  <text x="1548" y="543" class="domain" text-anchor="middle" fill="#B85120">Medicine Glossary</text>
  <line x1="1455" y1="556" x2="1640" y2="556" stroke="#EDC6AC" stroke-width="2"/>
  <text x="1548" y="587" class="term" text-anchor="middle">rectal cancer</text>
  <text x="1548" y="621" class="term" text-anchor="middle" fill="#84257F">→ 直肠癌</text>

  <path d="M1408 582 H1432" class="control-line"/>

  <path d="M1160 389 H1118" class="control-line"/>
</svg>
