auto_working:
  prompt_k: 10
  base_slice: none
  initial_slice: nlp_core_10k
  slices:
    common_terms:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/scale_aclgold_10000.json
      type: diagnostic
      domain: general
      weight: 1.0
    nlp_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/nlp_core_10k.json
      type: domain
      domain: nlp
      weight: 0.8
    medicine_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/medicine_core_10k.json
      type: domain
      domain: medicine
      weight: 0.8
    education_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/education_core_10k.json
      type: domain
      domain: education
      weight: 0.8
    finance_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/finance_core_10k.json
      type: domain
      domain: finance
      weight: 0.8
    legal_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/legal_core_10k.json
      type: domain
      domain: legal
      weight: 0.8
    environment_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/environment_core_10k.json
      type: domain
      domain: environment
      weight: 0.8
    entertainment_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/entertainment_core_10k.json
      type: domain
      domain: entertainment
      weight: 0.8
    science_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/science_core_10k.json
      type: domain
      domain: science
      weight: 0.8
    sports_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/sports_core_10k.json
      type: domain
      domain: sports
      weight: 0.8
    art_core_10k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/art_core_10k.json
      type: domain
      domain: art
      weight: 0.8
    open_wiki_100k:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/open_wiki_100k.json
      type: rescue
      weight: 0.4
    acl_tagged_raw:
      path: /mnt/data2/jiaxuanluo/rasst-demo/runtime/term_memory/acl_tagged_raw.json
      type: oracle
      eval_only: true
      weight: 1.0
  routing:
    mode: hybrid_window_topic
    enable_talk_level: true
    enable_chunk_level: true
    enable_fallback: true
    enable_context_similarity: true
    context_similarity_model: BAAI/bge-m3
    context_similarity_device: cpu
    context_similarity_batch_size: 32
    context_similarity_weight: 0.60
    text_topic_weight: 0.25
    domain_probe_weight: 0.10
    domain_probe_top_k: 5
    speech_centroid_weight: 0.03
    metadata_prior_weight: 0.02
    domain_activate_threshold: 0.60
    domain_margin_threshold: 0.15
    current_margin_threshold: 0.30
    min_consistent_windows: 2
    min_consistent_windows_with_text: 2
    min_consistent_windows_generated_target: 2
    min_consistent_windows_audio_only: 3
    audio_probe_min_top_score: 0.50
    audio_probe_min_raw_margin: 0.08
    audio_probe_min_positive_domains: 2
    generated_target_probe_min_top_score: 0.25
    generated_target_probe_min_raw_margin: 0.01
    generated_target_probe_min_positive_domains: 1
    enable_generated_target_text: true
    generated_target_window_chunks: 12
    generated_target_min_chars: 6
    slice_selection_mode: hard_top1
    term_budget: 100000
    max_active_slices: 0
    unknown_slice_term_count: 10000
    pin_active_slice: true
    update_sec: 5
    warmup_sec: 6
    switch_cooldown_sec: 90
    production_update_sec: 10
    production_warmup_sec: 20
    production_cooldown_sec: 30
    candidate_stale_sec: 120
    low_confidence_threshold: 0.35
  retrieval:
    topk_per_slice: 10
    candidate_budget: 0
    prompt_k: 10
    candidate_score_threshold: 0.78
    use_lexical_match: true
    use_acronym_match: true
    use_domain_prior: true
    use_term_memory_prior: true
    use_genericity_penalty: true
    use_open_wiki_rescue: true
